
[platformio]
default_envs = esp32-2432s028

[env:esp32-2432s028]
platform = platformio/espressif32@6.12.0
board = esp32dev
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partitions_4mb_ota_1600k.csv

; Biblioteki wymagane dla projektu
lib_deps = 
    bblanchon/ArduinoJson@^7.0.0
    bodmer/TFT_eSPI@^2.5.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
; Ustawienia kompilacji
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DENABLE_TFT_DISPLAY
    -I${PROJECT_SRC_DIR}

; Skopiuj User_Setup.h do biblioteki TFT_eSPI przed kompilacją
extra_scripts = 
    pre:copy_user_setup.py
    pre:patch_tftespi_smooth_font.py

monitor_speed = 115200
monitor_encoding = utf-8

[env:esp32-ili9341-38pin]
platform = platformio/espressif32@6.12.0
board = esp32dev
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partitions_4mb_ota_1600k.csv

lib_deps = 
    bblanchon/ArduinoJson@^7.0.0
    bodmer/TFT_eSPI@^2.5.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DENABLE_TFT_DISPLAY
    -DTOUCH_IRQ=35
    -DTOUCH_MISO=27
    -I${PROJECT_SRC_DIR}

extra_scripts = 
    pre:copy_user_setup.py
    pre:patch_tftespi_smooth_font.py

monitor_speed = 115200
monitor_encoding = utf-8
